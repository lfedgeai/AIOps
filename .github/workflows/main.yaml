name: Run Podman Compose demos

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'
      # Implicitly ignores README.md and research/ because they aren't listed here.

  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'

  workflow_dispatch:

jobs:
  podman-compose:
    runs-on: ubuntu-latest

    env:
      XDG_RUNTIME_DIR: ${{ github.workspace }}/podman-runtime
      TMPDIR: ${{ github.workspace }}/podman-tmp
      PODMAN_STORAGE: ${{ github.workspace }}/podman-storage

    steps:
    # --------------------------------------------------
    # 1️⃣ MANUAL CHECKOUT (Bypasses Submodule Errors)
    # --------------------------------------------------
    - name: Manual Clean Checkout
      run: |
        git init .
        # FIXED: Added the "/" and the "${{ }}" wrapper
        git remote add origin "https://github.com{{ github.repository }}"
        git fetch --depth 1 origin ${{ github.sha }}
        git checkout --force FETCH_HEAD
        
        # Kill the phantom submodule link immediately to prevent crashes
        git rm --cached -r research/anomaly_detection/performance_comparison/chaos_engineering/otel-demo || true
        echo "✅ Repo initialized and broken metadata removed."

    - name: 🔍 DEBUG - Show Changed Files
      run: |
        echo "Files changed in this push:"
        git diff-tree --no-commit-id --name-only -r ${{ github.sha }}

    # --------------------------------------------------
    # 2️⃣ Free disk space
    # --------------------------------------------------
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune -a -f || true
        df -h

    # --------------------------------------------------
    # 3️⃣ Install Podman & podman-compose
    # --------------------------------------------------
    - name: Install Podman & podman-compose
      run: |
        sudo apt-get update -y
        sudo apt-get install -y podman uidmap python3-pip
        pip install podman-compose

    # --------------------------------------------------
    # 4️⃣ Configure Podman runtime & storage
    # --------------------------------------------------
    - name: Configure Podman
      run: |
        mkdir -p ~/.config/containers "$XDG_RUNTIME_DIR" "$TMPDIR" "$PODMAN_STORAGE"
        chmod 700 "$XDG_RUNTIME_DIR"
        chmod 777 "$TMPDIR" "$PODMAN_STORAGE"
        
        cat <<EOF > ~/.config/containers/containers.conf
        [engine]
        cgroup_manager = "cgroupfs"
        runtime = "crun"
        events_logger = "file"
        systemd = false
        log_level = "error"
        EOF

        cat <<EOF > ~/.config/containers/storage.conf
        [storage]
        driver = "overlay"
        graphroot = "$PODMAN_STORAGE"
        runroot = "$XDG_RUNTIME_DIR/runroot"
        EOF

        podman system migrate

    # --------------------------------------------------
    # 5️⃣ Cleanup
    # --------------------------------------------------
    - name: Cleanup
      run: podman system prune -a -f

    # ==================================================
    # 🔹 DEMO 1 — BASICS
    # ==================================================
    - name: Run demo-1-basics
      working-directory: demo/demo-1-basics
      run: |
        podman network create anomaly-network || true
        podman-compose build --no-cache 2>/dev/null
        podman-compose up -d 2>/dev/null
        echo "✅ demo-1-basics running containers:"
        podman ps --format "table {{.Names}}\t{{.Status}}"
        podman-compose down -v 2>/dev/null

    - run: podman system prune -a -f

    # ==================================================
    # 🔹 DEMO 2 — OTEL
    # ==================================================
    - name: Run demo-2-otel
      working-directory: demo/demo-2-otel
      run: |
        podman network create edge-network || true
        podman-compose build --no-cache 2>/dev/null
        podman-compose up -d 2>/dev/null
        echo "✅ demo-2-otel running containers:"
        podman ps --format "table {{.Names}}\t{{.Status}}"

    # --------------------------------------------------
    # 6️⃣ Final cleanup
    # --------------------------------------------------
    - name: Final cleanup
      if: always()
      run: podman system prune -a -f
