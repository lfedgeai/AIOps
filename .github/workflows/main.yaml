name: Run Podman Compose Demos

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'
      - 'demo/demo-3-mlflow/**'
      - '!README.md'
      - '!README.MD'
      - '!docs/**'

  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'
      - 'demo/demo-3-mlflow/**'
      - '!README.md'
      - '!README.MD'
      - '!docs/**'

  workflow_dispatch:

jobs:
  podman-compose:
    runs-on: ubuntu-latest

    env:
      XDG_RUNTIME_DIR: ${{ github.workspace }}/podman-runtime
      TMPDIR: ${{ github.workspace }}/podman-tmp
      PODMAN_STORAGE: ${{ github.workspace }}/podman-storage

    steps:

    # --------------------------------------------------
    # 1️⃣ Checkout
    # --------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
        set-safe-directory: false
        fetch-depth: 1
        clean: true

    # --------------------------------------------------
    # 2️⃣ Debug changed files
    # --------------------------------------------------
    - name: 🔍 DEBUG - Show Changed Files
      run: |
        echo "Changed files:"
        git diff-tree --no-commit-id --name-only -r ${{ github.sha }}

    # --------------------------------------------------
    # 3️⃣ Free disk space
    # --------------------------------------------------
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune -a -f || true
        df -h

    # --------------------------------------------------
    # 4️⃣ Install Podman
    # --------------------------------------------------
    - name: Install Podman & podman-compose
      run: |
        sudo apt-get update -y
        sudo apt-get install -y podman uidmap python3-pip curl
        pip install podman-compose

    # --------------------------------------------------
    # 5️⃣ Configure Podman
    # --------------------------------------------------
    - name: Configure Podman
      run: |
        mkdir -p ~/.config/containers "$XDG_RUNTIME_DIR" "$TMPDIR" "$PODMAN_STORAGE"
        chmod 700 "$XDG_RUNTIME_DIR"
        chmod 777 "$TMPDIR" "$PODMAN_STORAGE"

        cat <<EOF > ~/.config/containers/containers.conf
        [engine]
        cgroup_manager = "cgroupfs"
        runtime = "crun"
        events_logger = "file"
        systemd = false
        log_level = "error"
        EOF

        cat <<EOF > ~/.config/containers/storage.conf
        [storage]
        driver = "overlay"
        graphroot = "$PODMAN_STORAGE"
        runroot = "$XDG_RUNTIME_DIR/runroot"
        EOF

        podman system migrate

    # ==================================================
    # 🔹 DEMO 1
    # ==================================================
    - name: Run demo-1-basics
      working-directory: demo/demo-1-basics
      run: |
        podman network create anomaly-network || true
        podman-compose up -d --build
        sleep 10
        podman ps
        podman-compose down -v

    # ==================================================
    # 🔹 DEMO 2
    # ==================================================
    - name: Run demo-2-otel
      working-directory: demo/demo-2-otel
      run: |
        podman network create edge-network || true
        podman-compose up -d --build
        sleep 15
        podman ps
        podman-compose down -v

    # ==================================================
    # 🔹 DEMO 3 (MLflow Stack)
    # ==================================================
    - name: Run demo-3-mlflow
      working-directory: demo/demo-3-mlflow
      run: |
        echo "Creating .env file"

        cat <<EOF > .env
        POSTGRES_DB=mlflowdb
        POSTGRES_USER=mlflow
        POSTGRES_PASSWORD=mlflow123
        MINIO_ROOT_USER=minio
        MINIO_ROOT_PASSWORD=minio123
        MINIO_STORAGE_BUCKET=mlflow
        MLFLOW_PORT=5000
        EOF

        podman network create mlflow-network || true

        podman-compose up -d --build

        echo "Waiting for services..."
        sleep 30

        echo "Running containers:"
        podman ps

        echo "Testing MLflow endpoint..."
        curl --fail http://localhost:5000 || exit 1

        echo "Stopping demo-3"
        podman-compose down -v

    # --------------------------------------------------
    # 6️⃣ Final Cleanup
    # --------------------------------------------------
    - name: Final cleanup
      if: always()
      run: |
        podman system prune -a -f