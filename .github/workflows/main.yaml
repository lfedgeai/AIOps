name: Run Podman Compose demos

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'

  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/main.yaml'
      - 'demo/demo-1-basics/**'
      - 'demo/demo-2-otel/**'

  workflow_dispatch:

jobs:
  podman-compose:
    runs-on: ubuntu-latest

    env:
      XDG_RUNTIME_DIR: ${{ github.workspace }}/podman-runtime
      TMPDIR: ${{ github.workspace }}/podman-tmp
      PODMAN_STORAGE: ${{ github.workspace }}/podman-storage
      # Map the repository name here to avoid Line 35 errors
      REPO_NAME: ${{ github.repository }}
      COMMIT_SHA: ${{ github.sha }}

    steps:
    # --------------------------------------------------
    # 1️⃣ MANUAL CHECKOUT (Bypasses Submodule Errors)
    # --------------------------------------------------
    - name: Manual Clean Checkout
      run: |
        git init .
        # Use the environment variable mapped above
        git remote add origin "https://github.com"
        git fetch --depth 1 origin "$COMMIT_SHA"
        git checkout --force FETCH_HEAD
        
        # Kill the phantom submodule link immediately
        git rm --cached -r research/anomaly_detection/performance_comparison/chaos_engineering/otel-demo || true
        echo "✅ Repo initialized and metadata cleaned."

    - name: 🔍 DEBUG - Show Changed Files
      run: |
        echo "Files changed in this push:"
        git diff-tree --no-commit-id --name-only -r "$COMMIT_SHA"

    # --------------------------------------------------
    # 2️⃣ Free disk space
    # --------------------------------------------------
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune -a -f || true
        df -h

    # --------------------------------------------------
    # 3️⃣ Install Podman & podman-compose
    # --------------------------------------------------
    - name: Install Podman & podman-compose
      run: |
        sudo apt-get update -y
        sudo apt-get install -y podman uidmap python3-pip
        pip install podman-compose

    # --------------------------------------------------
    # 4️⃣ Configure Podman runtime & storage
    # --------------------------------------------------
    - name: Configure Podman
      run: |
        mkdir -p ~/.config/containers "$XDG_RUNTIME_DIR" "$TMPDIR" "$PODMAN_STORAGE"
        chmod 700 "$XDG_RUNTIME_DIR"
        chmod 777 "$TMPDIR" "$PODMAN_STORAGE"
        
        cat <<EOF > ~/.config/containers/containers.conf
        [engine]
        cgroup_manager = "cgroupfs"
        runtime = "crun"
        events_logger = "file"
        systemd = false
        log_level = "error"
        EOF

        cat <<EOF > ~/.config/containers/storage.conf
        [storage]
        driver = "overlay"
        graphroot = "$PODMAN_STORAGE"
        runroot = "$XDG_RUNTIME_DIR/runroot"
        EOF

        podman system migrate

    # ==================================================
    # 🔹 RUN DEMOS
    # ==================================================
    - name: Run demo-1-basics
      working-directory: demo/demo-1-basics
      run: |
        podman network create anomaly-network || true
        podman-compose up -d
        podman ps
        podman-compose down -v

    - name: Run demo-2-otel
      working-directory: demo/demo-2-otel
      run: |
        podman network create edge-network || true
        podman-compose up -d
        podman ps

    - name: Final cleanup
      if: always()
      run: podman system prune -a -f
