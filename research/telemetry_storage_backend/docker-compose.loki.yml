# Loki - logs only, extends main compose
# Run: docker compose -f docker-compose.yml -f docker-compose.druid.yml -f docker-compose.loki.yml up -d
# Loki API: http://localhost:3100

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: tsb-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
