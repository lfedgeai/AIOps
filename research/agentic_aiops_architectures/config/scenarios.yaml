# Experiment scenarios — same fault injection, different agent topology / tool access.
# Override with env SCENARIO=0|a|b|c or harness --scenario.

scenarios:
  "0":
    id: "0"
    name: baseline_telemetry
    description: >
      Baseline. Single agent with telemetry tools only (logs, traces, metrics).
      No Kubernetes API access — agent can detect faults but cannot inspect
      cluster state or execute remediation.
    mode: single
    tool_profile: telemetry_only

  a:
    id: a
    name: multimodal_telemetry_k8s
    description: >
      Single agent with telemetry AND Kubernetes tools. Can detect faults via
      observability data, inspect cluster state (pod status, events), and
      execute remediation (restart, scale, delete pod).
    mode: single
    tool_profile: telemetry_k8s

  b:
    id: b
    name: signal_specialists
    description: Three agents — one each for logs, traces, and metrics.
    mode: multi
    roles:
      - id: logs
        tool_profile: logs_only
      - id: traces
        tool_profile: traces_only
      - id: metrics
        tool_profile: metrics_only

  c:
    id: c
    name: domain_specialists
    description: Three agents — hardware (metrics), platform (Kubernetes), application (logs/traces).
    mode: multi
    roles:
      - id: hardware
        tool_profile: hardware_metrics
      - id: platform
        tool_profile: platform_k8s
      - id: application
        tool_profile: application_telemetry
