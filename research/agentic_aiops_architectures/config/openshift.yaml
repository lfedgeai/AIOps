# OpenShift deployment configuration for Agentic AIOps experiment tracking
# Use with: oc apply -f config/openshift.yaml (or apply individual manifests)

cluster:
  # Cluster context name from `oc config get-contexts`
  context: "default/api-sno1gpu-localdomain:6443/kube:admin"
  # API URL (e.g. https://api.cluster-xxx.openshift.com:6443)
  api_url: "https://api.sno1gpu.localdomain:6443"
  # Optional: custom CA bundle path if using self-signed certs
  # ca_bundle: ""

namespace: agentic-aiops

mlflow:
  enabled: true
  image: ghcr.io/mlflow/mlflow:v2.9.2
  port: 5000
  backend_store: sqlite
  # For multi-user: switch to postgresql and set via secret
  # backend_store: postgresql
  # backend_uri_secret: mlflow-db-uri
  storage:
    size: 5Gi
    # OpenShift StorageClass (empty = cluster default)
    storage_class: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

route:
  # Hostname for MLflow UI (empty = auto-generated by OpenShift)
  hostname: ""
  tls:
    termination: edge

# Artifact storage (for MLflow artifacts)
# Local to PVC by default; for production consider S3/MinIO/ODF
artifacts:
  backend: pvc
  # pvc_name: mlflow-artifacts-pvc
