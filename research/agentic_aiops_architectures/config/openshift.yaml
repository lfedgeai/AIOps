# OpenShift deployment configuration for Agentic AIOps experiment tracking
#
# Cluster identity is configurable (do not hardcode lab cluster names here):
#   1. config/openshift.local.yaml  (gitignored; see openshift.local.yaml.example)
#   2. Environment: OPENSHIFT_CONTEXT, OPENSHIFT_API_URL, OPENSHIFT_NAMESPACE
#   3. Defaults below (empty = use current `oc` session / oc login target)
#
# Load merged config in Python: code.harness.openshift_config.load_openshift_config()
# CLI: python -m code.harness.openshift_config

cluster:
  # From `oc config current-context` — set in openshift.local.yaml or OPENSHIFT_CONTEXT
  context: ""
  # e.g. https://api.<cluster-domain>:6443 — set in openshift.local.yaml or OPENSHIFT_API_URL
  api_url: ""
  # Optional: custom CA bundle path if using self-signed certs
  # ca_bundle: ""

namespace: agentic-aiops

mlflow:
  enabled: true
  image: ghcr.io/mlflow/mlflow:v2.9.2
  port: 5000
  backend_store: sqlite
  # For multi-user: switch to postgresql and set via secret
  # backend_store: postgresql
  # backend_uri_secret: mlflow-db-uri
  storage:
    size: 5Gi
    # OpenShift StorageClass (empty = cluster default)
    storage_class: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

route:
  # Hostname for MLflow UI (empty = auto-generated by OpenShift)
  hostname: ""
  tls:
    termination: edge

# Artifact storage (for MLflow artifacts)
# Local to PVC by default; for production consider S3/MinIO/ODF
artifacts:
  backend: pvc
  # pvc_name: mlflow-artifacts-pvc
