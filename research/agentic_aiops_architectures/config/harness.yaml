# Harness configuration for MTTD/MTTR experiments
# Env vars (MLFLOW_TRACKING_URI, FLAGD_*, AGENT_TIMEOUT, MAX_TOOL_ITERATIONS, SCENARIO, etc.) override these when set.

# Default experiment scenario: a=multimodal telemetry, b=signal specialists, c=domain specialists
harness:
  agent_timeout_seconds: 1200
  max_tool_iterations: 8
  default_scenario: a
  default_fault_flag: scale_zero
  default_fault_variant: cart

# Flagd: use ConfigMap patch when flagd-ui HTTP write returns 404 (common on OpenShift)
flagd:
  use_openshift_cm: true
  configmap_namespace: otel-demo

mlflow:
  tracking_uri: "http://localhost:5050"
  insecure_tls: false
  # Optional: override default experiment description (MLflow UI note at harness start)
  # experiment_description: |
  #   Custom markdown for experiment **agentic_aiops_mttd_mttr**.
